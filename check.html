<!DOCTYPE html>
<html>
<head>
    <title>Check Website</title>
    <style>
        body {
            margin:0;
            font-family:'Segoe UI', sans-serif;
            background: url("/static/images/images.jpg") no-repeat center center fixed;
            background-size: cover;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .container {
            background: rgba(0, 0, 0, 0.65);
            padding:40px 30px;
            border-radius:15px;
            width:400px;
            box-shadow:0 15px 35px rgba(0,0,0,0.4);
            color:#fff;
        }

        h1 {
            text-align:center;
            margin-bottom:25px;
            color:#e0f7fa;
        }

        label {
            font-weight:bold;
            display:block;
            margin-bottom:8px;
        }

        input[type=text] {
            width:100%;
            padding:12px;
            border-radius:8px;
            border:none;
            margin-bottom:20px;
            outline:none;
        }

        button {
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#00796b;
            color:#fff;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover {
            transform:scale(1.03);
            opacity:0.9;
        }

        a {
            display:block;
            text-align:center;
            margin-top:15px;
            color:#b2ebf2;
            text-decoration:none;
            font-weight:bold;
        }

        a:hover {
            text-decoration:underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Check Website</h1>

        <!-- FIXED FORM ACTION -->
        <form method="POST" action="/check">
            <label>Enter Website URL</label>
            <input type="text" name="website_url" placeholder="https://example.com" required>

            <button type="submit">Analyze</button>
        </form>

        <a href="/home">⬅ Back to Home</a>
    </div>

</body>
</html>
