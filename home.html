<!DOCTYPE html>
<html>
<head>
    <title>Home - Dashboard</title>
    <style>
        /* 🌙 Dark Mode Styles */

body.dark {
    background-image: none;
    background-color: #121212;
}

body.dark .overlay {
    background: rgba(0,0,0,0.9);
}

body.dark .sidebar {
    background: #1e1e1e;
}

body.dark .main {
    color: #ffffff;
}

body.dark input {
    background: #2c2c2c;
    color: white;
}

body.dark button {
    background: #333;
    color: white;
}
        body{
            margin:0;
            font-family:'Segoe UI', sans-serif;
            background-image: url("/static/images/images.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .overlay{
            min-height:100vh;
            background:rgba(0,0,0,0.6);
        }

        .sidebar{
            width:220px;
            height:100vh;
            position:fixed;
            background:rgba(0,0,0,0.6);
            color:#fff;
            padding:20px;
        }

        .sidebar a{
            display:block;
            color:#fff;
            text-decoration:none;
            margin:15px 0;
        }

        .main{
            margin-left:240px;
            padding:40px;
            color:#fff;
        }

        input{
            padding:12px;
            width:60%;
            border-radius:6px;
            border:none;
        }

        button{
            padding:12px 25px;
            border:none;
            border-radius:6px;
            background:#00e5ff;
            font-weight:bold;
            cursor:pointer;
        }
    </style>
</head>
<body class="{% if dark %}dark{% endif %}">
<div class="overlay">

    <div class="sidebar">
        <h2>Menu</h2>
        <a href="/home">🏠 Home</a>
        <a href="/check">🔍 Check</a>
        <a href="/history">📊 History</a>
        <a href="/profile">⚙ Settings</a>
        <a href="/logout">🚪 Logout</a>
    </div>

    <div class="main">
        <h1>Welcome 👋</h1>
        <p>Enter Website URL to check safety</p>

        <!-- FIXED FORM ACTION -->
        <form action="/check" method="POST">
            <input type="text" name="website_url" placeholder="example.com" required>
            <br><br>
            <button type="submit">Start Checking</button>
        </form>
    </div>

</div>
</body>
</html>
