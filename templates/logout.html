<!DOCTYPE html>
<html>
<head>
    <title>Logout - Modern Professional</title>

    <style>
        body {
            margin:0;
            font-family:'Segoe UI', sans-serif;

            background-image: url("/static/images/images.jpg");
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            background-attachment: fixed;

            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .container {
            background: rgba(255,255,255,0.9);
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.25);
            width: 420px;
            text-align: center;
        }

        h1 {
            color: #222;
            margin-bottom: 25px;
        }

        a.button {
            padding: 12px 28px;
            border-radius: 8px;
            background: black;
            color: white;
            cursor: pointer;
            font-weight: bold;
            margin: 10px;
            text-decoration: none;
            display: inline-block;
        }

        a.button:hover {
            background: #333;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🚪 Are you sure you want to logout?</h1>

    <a href="/login" class="button">Yes</a>
    <a href="/home" class="button">No</a>
</div>

</body>
</html>
